body,
        html {
            height: 100%;
            margin: 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        
            grid-gap: 10px;
            margin: 0;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 530px;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay-content {
            text-align: center;
        }


    /* Custom Navbar Styles */

      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;

    .custom-navbar a {

      align-items: center;
      text-decoration: none;

      font-size: 1.7em;

    <script>
      // Expanded translation logic for this page
      const translations = {
        PT: {
          overlays: [
            "Pôr do sol na praia do Porto",
            "Jardim Botânico do Porto",
            "Rua típica do Porto",
            "Vista do Douro",
            "Detalhe de arquitetura",
            "Café histórico",
            "Arte urbana",
            "Praça central",
            "Mercado tradicional",
            "Ponte famosa",
            "Cores da cidade",
            "Noite no Porto"
          ]
        },
        EN: {
          overlays: [
            "Sunset at Porto beach",
            "Porto Botanical Garden",
            "Typical Porto street",
            "Douro river view",
            "Architectural detail",
            "Historic café",
            "Urban art",
            "Central square",
            "Traditional market",
            "Famous bridge",
            "City colors",
            "Night in Porto"
          ]
        }
      };
      function setLanguage(lang) {
        const overlays = document.querySelectorAll('.overlay-content');
        translations[lang].overlays.forEach((caption, i) => {
          if (overlays[i]) overlays[i].textContent = caption;
        });
      }
      setupLangToggle(translations, setLanguage);
    </script>
